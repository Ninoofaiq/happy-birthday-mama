<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Letter 💌🌸</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at top, #ffe6f0, #e6f7ff, #ffffff);
        }

        /* ===== BUNGA JATUH ===== */
        .flower {
            position: absolute;
            top: -50px;
            font-size: 22px;
            animation: fall linear infinite;
            pointer-events: none;
            opacity: 0.8;
        }

        @keyframes fall {
            0% {
                transform: translateY(-10vh) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translateY(110vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* ===== CONFETTI ===== */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: red;
            top: -10px;
            animation: confettiFall 3s linear forwards;
            z-index: 999;
        }

        @keyframes confettiFall {
            to {
                transform: translateY(110vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* ===== ENVELOPE ===== */
        .envelope {
            width: 220px;
            height: 150px;
            background: #ff6fa1;
            position: relative;
            cursor: pointer;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: 0.4s;
            z-index: 10;
        }

        .envelope:before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            border-left: 110px solid transparent;
            border-right: 110px solid transparent;
            border-top: 85px solid #ff8fb3;
        }

        .envelope.open {
            transform: scale(0.9) translateY(-20px);
            opacity: 0;
        }

        /* ===== LETTER ===== */
        .letter {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 360px;
            padding: 25px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            z-index: 20;
            transition: 0.5s;
        }

        .letter.show {
            transform: translate(-50%, -50%) scale(1);
        }

        h1 {
            color: #ff4d88;
            margin-bottom: 10px;
        }

        /* teks animasi */
        .text {
            margin-top: 10px;
            text-align: left;
            color: #444;
            line-height: 1.7;
            min-height: 160px;
            white-space: pre-line;
        }

        .cursor {
            display: inline-block;
            width: 2px;
            background: #ff4d88;
            animation: blink 0.7s infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        /* tombol */
        .close {
            margin-top: 15px;
            padding: 8px 18px;
            background: #ff4d88;
            color: white;
            border-radius: 20px;
            display: inline-block;
            cursor: pointer;
        }

        /* glow background */
        .glow {
            position: absolute;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
        }

        .glow1 {
            background: #ffb6d9;
            top: 10%;
            left: 10%;
        }

        .glow2 {
            background: #7bdff2;
            bottom: 10%;
            right: 10%;
        }
    </style>
</head>

<body>

    <div class="glow glow1"></div>
    <div class="glow glow2"></div>

    <div class="envelope" id="env" onclick="openLetter()"></div>

    <div class="letter" id="letter">
        <h1>🎂 Happy Birthday 🎂</h1>
        <div class="text" id="text"></div>
        <div class="close" onclick="closeLetter()">Tutup</div>
    </div>

    <audio id="music" Loop>
        <source
            src="https://cdn.pixabay.com/download/audio/2023/03/13/audio_7c2a2c2f2d.mp3?filename=soft-piano-melody-ambient-145039.mp3">
    </audio>

    <script>

        /* ===== BUNGA ===== */
        function createFlower() {
            const f = document.createElement("div");
            f.classList.add("flower");

            const list = ["🌸", "🌷", "🌺", "💐", "🌼"];
            f.innerHTML = list[Math.floor(Math.random() * list.length)];

            f.style.left = Math.random() * 100 + "vw";
            f.style.fontSize = (16 + Math.random() * 24) + "px";
            f.style.animationDuration = (4 + Math.random() * 6) + "s";

            document.body.appendChild(f);
            setTimeout(() => f.remove(), 9000);
        }
        setInterval(createFlower, 150);

        /* ===== CONFETTI ===== */
        function createConfetti() {
            for (let i = 0; i < 30; i++) {
                const c = document.createElement("div");
                c.classList.add("confetti");
                c.style.left = Math.random() * 100 + "vw";
                c.style.background = `hsl(${Math.random() * 360},70%,60%)`;
                c.style.animationDuration = (2 + Math.random() * 2) + "s";
                document.body.appendChild(c);
                setTimeout(() => c.remove(), 3000);
            }
        }

        /* ===== SURAT ===== */
        function openLetter() {
            document.getElementById("env").classList.add("open");
            document.getElementById("letter").classList.add("show");
            document.getElementById("music").play();

            createConfetti();
            typeWriter();
        }

        /* ===== TYPEWRITER PER PARAGRAF ===== */
        const messages = [
            `Selamat ulang tahun mama 🌸`,

            `Semoga hari ini penuh kebahagiaan,
dan semua hal baik datang ke hidupmu ✨`,

            `Aku harap mama selalu tersenyum,
sekuat apa pun dunia mencoba menjatuhkanmu 💖`,

            `Terus jadi versi terbaik dari dirimu,
karena mama sudah luar biasa, i love you mom 🌷`
        ];

        let index = 0;
        let char = 0;

        function typeWriter() {
            const text = document.getElementById("text");

            if (index < messages.length) {
                if (char < messages[index].length) {
                    text.innerHTML += messages[index].charAt(char);
                    char++;
                    setTimeout(typeWriter, 30);
                } else {
                    text.innerHTML += "\n\n";
                    index++;
                    char = 0;
                    setTimeout(typeWriter, 400);
                }
            }
        }

        /* reset */
        function closeLetter() {
            document.getElementById("letter").classList.remove("show");
            document.getElementById("env").classList.remove("open");
            document.getElementById("text").innerHTML = "";
            index = 0;
            char = 0;
        }

    </script>

</body>

</html>
